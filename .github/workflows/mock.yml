name: SafeTemp Mock Data

on:
  schedule:
    - cron: '*/5 * * * *' 
  workflow_dispatch:  

jobs:
  send-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node mock.js
        env:
          API_URL: ${{ secrets.API_URL }}
